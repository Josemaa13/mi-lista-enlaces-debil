<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - LinkVault</title>
    <link rel="stylesheet" href="/styles.css">
    <style> 
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">LinkVault</a>
    </nav>

    <div class="glass-panel form-container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrarse</button>
        </div>

        <div id="alert-msg" class="alert"></div>

        <!-- Login Form -->
        <div id="login-section" class="form-section active">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Usuario</label>
                    <input type="text" id="login-username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" class="form-control" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Entrar al Dashboard</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-section" class="form-section">
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">Nuevo Usuario</label>
                    <input type="text" id="reg-username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña Segura</label>
                    <input type="password" id="reg-password" class="form-control" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script>
        // Tab switching logic based on url parameters
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'register') {
            switchTab('register');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`${tab}-section`).classList.add('active');
            hideAlert();
        }

        function showAlert(msg, isError = true) {
            const alertBox = document.getElementById('alert-msg');
            alertBox.textContent = msg;
            alertBox.className = `alert ${isError ? 'error' : 'success'}`;
        }

        function hideAlert() {
            const alertBox = document.getElementById('alert-msg');
            alertBox.style.display = 'none';
        }

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Verificando...';
            btn.disabled = true;

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showAlert(data.error || 'Error al iniciar sesión');
                }
            } catch (err) {
                showAlert('Error de conexión con el servidor');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Handle Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Creando cuenta...';
            btn.disabled = true;

            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('Cuenta creada exitosamente. Iniciando sesión...', false);
                    // Automatic login
                    await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Error al registrarte');
                }
            } catch (err) {
                showAlert('Error de conexión con el servidor');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
