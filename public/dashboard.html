<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LinkVault</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .link-url {
            color: var(--primary-color);
            text-decoration: none;
            word-break: break-all;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .link-url:hover {
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">LinkVault</a>
        <div class="nav-links" style="display: flex; align-items: center;">
            <span id="user-greeting" style="margin-right: 1.5rem; color: var(--text-secondary); font-weight: 500;"></span>
            <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Mi Colección</h2>
        </div>

        <div id="alert-msg" class="alert"></div>

        <div class="glass-panel add-link-form">
            <div class="form-group">
                <label for="new-url">URL del Enlace</label>
                <input type="url" id="new-url" class="form-control" placeholder="https://ejemplo.com" required>
            </div>
            <div class="form-group">
                <label for="new-desc">Descripción</label>
                <input type="text" id="new-desc" class="form-control" placeholder="Ej: Documentación útil">
            </div>
            <button onclick="addLink()" class="btn btn-primary" style="height: 48px;">Guardar</button>
        </div>
        <div class="search-box" style="margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Buscar en mis enlaces..." class="form-control" style="display:inline-block; width: 70%;">
            <button onclick="searchLinks()" class="btn btn-primary">Buscar</button>
        </div>      

        <div class="links-grid" id="links-container">
            <!-- Los enlaces se cargarán aquí dinámicamente -->
        </div>

    </div>
<script src="/js/dashboard.js"></script>
</body>
</html>
